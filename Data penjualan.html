<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Penjualan</title>
<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}
h2 {
    text-align: center;
}
table {
    width: 100%;
    background: white;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;
}
th {
    background: #4CAF50;
    color: white;
}
input {
    padding: 8px;
    margin: 5px;
}
button {
    padding: 10px 15px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}
#grandTotal {
    font-size: 20px;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>
<body>

<h2>Data Penjualan</h2>

<table id="tabelJualan">
<tr>
    <th>Menu</th>
    <th>Harga</th>
    <th>Jumlah</th>
    <th>Total</th>
</tr>
</table>

<br>

<input type="text" id="nama" placeholder="Menu">
<input type="number" id="harga" placeholder="Harga">
<input type="number" id="jumlah" placeholder="Jumlah">
<button onclick="tambahData()">Tambah</button>

<div id="grandTotal">Total Semua: Rp 0</div>

<script>
let totalSemua = 0;

function tambahData() {
    let nama = document.getElementById("nama").value;
    let harga = parseInt(document.getElementById("harga").value);
    let jumlah = parseInt(document.getElementById("jumlah").value);

    if (!nama || isNaN(harga) || isNaN(jumlah)) {
        alert("Isi semua data dulu bro!");
        return;
    }

    let total = harga * jumlah;
    totalSemua += total;

    let tabel = document.getElementById("tabelJualan");
    let row = tabel.insertRow();

    row.insertCell(0).innerText = nama;
    row.insertCell(1).innerText = harga;
    row.insertCell(2).innerText = jumlah;
    row.insertCell(3).innerText = total;

    document.getElementById("grandTotal").innerText = "Total Semua: Rp " + totalSemua;

    document.getElementById("nama").value = "";
    document.getElementById("harga").value = "";
    document.getElementById("jumlah").value = "";
}
</script>

</body>
</html>
