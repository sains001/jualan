<script type="module">
window.addEventListener("DOMContentLoaded", () => {

  import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js").then(async (firebaseApp) => {

    const { initializeApp } = firebaseApp;
    const { getDatabase, ref, push, onValue, remove } =
      await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");

    const firebaseConfig = {
      apiKey: "AIzaSyBX6-Pw3Rst9VBIoxzN5-EXq_GoN4761kM",
      authDomain: "penjulan-77b0d.firebaseapp.com",
      databaseURL: "https://penjulan-77b0d-default-rtdb.firebaseio.com",
      projectId: "penjulan-77b0d",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const jualanRef = ref(db, "jualan");

    const tabel = document.getElementById("tabel");

    if (!tabel) {
      console.log("TABEL GAK KETEMU BRO");
      return;
    }

    window.tambahData = function () {
      let menu = document.getElementById("menu").value;
      let ukuran = document.getElementById("ukuran").value;
      let harga = parseInt(document.getElementById("harga").value);
      let jumlah = parseInt(document.getElementById("jumlah").value);

      if (!menu || !ukuran || !harga || !jumlah) {
        alert("Isi dulu bro!");
        return;
      }

      push(jualanRef, {
        menu,
        ukuran,
        harga,
        jumlah,
        total: harga * jumlah
      });
    };

    onValue(jualanRef, (snapshot) => {
      tabel.innerHTML = "";

      snapshot.forEach((child) => {
        let data = child.val();
        let row = tabel.insertRow();

        row.insertCell(0).innerText = data.menu;
        row.insertCell(1).innerText = data.total;
      });
    });

  });

});
</script>
