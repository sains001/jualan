<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>penjualan</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  padding:20px;
  text-align:center;
}

#jamBox{
  background:black;
  color:#00ff00;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

#jam{font-size:40px;font-weight:bold;}
#tanggal{font-size:14px;}

.rateBox{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  text-align:left;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  font-weight:bold;
  margin:5px;
  color:white;
}

.bronze{background:#cd7f32;}
.silver{background:#c0c0c0;}
.gold{background:#ffd700;color:black;}
.diamond{background:#6dd5ed;color:black;}

table{
  width:100%;
  background:white;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{background:green;color:white;}

input,select,button{
  padding:8px;
  margin:5px;
}

button{
  background:green;
  color:white;
  border:none;
  cursor:pointer;
}

.deleteBtn{background:red;}
</style>
</head>

<body>

<!-- JAM -->
<div id="jamBox">
  <div id="jam">00:00:00</div>
  <div id="tanggal">-</div>
</div>

<h3>Total Pendapatan: Rp <span id="totalPendapatan">0</span></h3>
<h3>Total Poin: <span id="totalPoin">0</span> poin</h3>
<h3>Nilai Poin: Rp <span id="rupiahPoin">0</span></h3>

<!-- BADGE LEVEL -->
<div>
  Level: <span id="levelBadge" class="badge bronze">BRONZE</span>
</div>

<!-- RATE INFO -->
<div class="rateBox">
  <h4>LEVEL / POIN:</h4>
  <ul>
    <li>0–39 poin → Rp 350 / poin</li>
    <li>40–59 poin → Rp 500 / poin</li>
    <li>60–79 poin → Rp 650 / poin</li>
    <li>80–120 poin → Rp 800 / poin</li>
  </ul>
</div>

<select id="menu" onchange="setHarga()">
<option value="">Pilih Menu</option>
<option value="jeruk">Es Jeruk</option>
<option value="alpukat">Jus Alpukat</option>
<option value="mangga">Jus Mangga</option>
<option value="stroberi">Jus Stroberi</option>
<option value="melon">Jus Melon</option>
<option value="semangka">Jus Semangka</option>
<option value="jambu">Jus Jambu</option>
<option value="naga">Jus Buah Naga</option>
<option value="nanas">Jus Nanas</option>
<option value="pir">Jus Pir</option>
</select>

<select id="ukuran" onchange="setHarga()">
<option value="">Ukuran</option>
<option value="kecil">Kecil</option>
<option value="besar">Besar</option>
</select>

<input type="number" id="harga" readonly placeholder="Harga">
<input type="number" id="jumlah" placeholder="Jumlah">

<button onclick="tambahData()">Tambah</button>

<table id="tabel">
<tr>
<th>No</th>
<th>Menu</th>
<th>Ukuran</th>
<th>Harga</th>
<th>Jumlah</th>
<th>Total</th>
<th>Poin</th>
<th>Waktu</th>
<th>Aksi</th>
</tr>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase,
ref,
push,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "ISI_APIKEY",
authDomain: "ISI_AUTHDOMAIN",
databaseURL: "https://penjulan-77b0d-default-rtdb.firebaseio.com",
projectId: "ISI_PROJECT_ID",
appId: "ISI_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const harianRef = ref(db,"jualan_harian");

/* JAM */
function updateJam(){
  let now=new Date();
  document.getElementById("jam").innerText = now.toLocaleTimeString("id-ID");
  document.getElementById("tanggal").innerText = now.toLocaleDateString("id-ID");
}
setInterval(updateJam,1000);
updateJam();

/* HARGA */
const hargaMenu={
  jeruk:{kecil:8000,besar:10000},
  alpukat:{kecil:9000,besar:15000},
  mangga:{kecil:9000,besar:15000},
  stroberi:{kecil:9000,besar:15000},
  melon:{kecil:9000,besar:15000},
  semangka:{kecil:9000,besar:15000},
  jambu:{kecil:9000,besar:15000},
  naga:{kecil:9000,besar:15000},
  nanas:{kecil:9000,besar:15000},
  pir:{kecil:9000,besar:15000}
};

function getWaktu(){
  return new Date().toLocaleString("id-ID");
}

/* POIN */
function hitungPoin(ukuran,jumlah){
  return (ukuran==="besar"?2:1)*jumlah;
}

/* TIER RUPIAH */
function hitungRupiahPoin(poin){
  let sisa=poin;
  let total=0;

  let a=Math.min(sisa,39); total+=a*350; sisa-=a;
  let b=Math.min(sisa,20); total+=b*500; sisa-=b;
  let c=Math.min(sisa,20); total+=c*650; sisa-=c;
  let d=Math.min(sisa,40); total+=d*800;

  return total;
}

/* LEVEL BADGE */
function setBadge(poin){
  let badge=document.getElementById("levelBadge");

  if(poin>=80){
    badge.className="badge diamond";
    badge.innerText="DIAMOND";
  }
  else if(poin>=60){
    badge.className="badge gold";
    badge.innerText="GOLD";
  }
  else if(poin>=40){
    badge.className="badge silver";
    badge.innerText="SILVER";
  }
  else{
    badge.className="badge bronze";
    badge.innerText="BRONZE";
  }
}

/* SET HARGA */
window.setHarga=function(){
  let m=document.getElementById("menu").value;
  let u=document.getElementById("ukuran").value;
  if(!m||!u) return;
  document.getElementById("harga").value=hargaMenu[m][u];
};

/* TAMBAH */
window.tambahData=function(){
  let menu=document.getElementById("menu").value;
  let ukuran=document.getElementById("ukuran").value;
  let harga=Number(document.getElementById("harga").value);
  let jumlah=Number(document.getElementById("jumlah").value);

  if(!menu||!ukuran||!harga||!jumlah){
    alert("Isi lengkap bro!");
    return;
  }

  let poin=hitungPoin(ukuran,jumlah);

  push(harianRef,{
    menu,ukuran,harga,jumlah,
    total:harga*jumlah,
    poin,
    waktu:getWaktu()
  });

  document.getElementById("jumlah").value="";
};

/* REALTIME */
const tabel=document.getElementById("tabel");

onValue(harianRef,(snap)=>{

  let totalUang=0;
  let totalPoin=0;

  tabel.innerHTML=`
  <tr>
  <th>No</th><th>Menu</th><th>Ukuran</th>
  <th>Harga</th><th>Jumlah</th>
  <th>Total</th><th>Poin</th><th>Waktu</th><th>Aksi</th>
  </tr>`;

  let no=1;

  snap.forEach(c=>{
    let d=c.val();

    totalUang+=d.total||0;
    totalPoin+=d.poin||0;

    let row=tabel.insertRow();
    row.insertCell(0).innerText=no++;
    row.insertCell(1).innerText=d.menu;
    row.insertCell(2).innerText=d.ukuran;
    row.insertCell(3).innerText=d.harga;
    row.insertCell(4).innerText=d.jumlah;
    row.insertCell(5).innerText=d.total;
    row.insertCell(6).innerText=d.poin;
    row.insertCell(7).innerText=d.waktu;

    let btn=document.createElement("button");
    btn.innerText="Hapus";
    btn.className="deleteBtn";
    btn.onclick=()=>remove(ref(db,"jualan_harian/"+c.key));

    row.insertCell(8).appendChild(btn);
  });

  document.getElementById("totalPendapatan").innerText=totalUang;
  document.getElementById("totalPoin").innerText=totalPoin;
  document.getElementById("rupiahPoin").innerText=hitungRupiahPoin(totalPoin);

  setBadge(totalPoin);
});

</script>

</body>
</html>
