<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SandiPlay</title>
<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}
h2 { text-align: center; }

table {
    width: 100%;
    background: white;
    border-collapse: collapse;
    margin-top: 10px;
}
th, td {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;
}
th {
    background: #4CAF50;
    color: white;
}

input {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 8px 12px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

.deleteBtn {
    background: red;
}

#grandTotal, #dailyReport {
    font-size: 18px;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>
<body>

<h2>PENJUALAN</h2>

<input type="text" id="nama" placeholder="Menu">
<input type="number" id="harga" placeholder="Harga">
<input type="number" id="jumlah" placeholder="Jumlah">
<button onclick="tambahData()">Tambah</button>

<table id="tabelJualan">
<tr>
    <th>Menu</th>
    <th>Harga</th>
    <th>Jumlah</th>
    <th>Total</th>
    <th>Aksi</th>
</tr>
</table>

<div id="grandTotal">Total Semua: Rp 0</div>
<div id="dailyReport">Laporan Hari Ini: Rp 0</div>

<script>
let data = JSON.parse(localStorage.getItem("dataJualan")) || [];

window.onload = function() {
    data.forEach((item, index) => {
        renderRow(item, index);
    });
    updateTotal();
    updateDailyReport();
};

function tambahData() {
    let nama = document.getElementById("nama").value;
    let harga = parseInt(document.getElementById("harga").value);
    let jumlah = parseInt(document.getElementById("jumlah").value);

    if (!nama || isNaN(harga) || isNaN(jumlah)) {
        alert("Isi semua data dulu bro!");
        return;
    }

    let total = harga * jumlah;

    let item = {
        nama,
        harga,
        jumlah,
        total,
        tanggal: new Date().toLocaleDateString()
    };

    data.push(item);
    localStorage.setItem("dataJualan", JSON.stringify(data));

    location.reload();
}

function renderRow(item, index) {
    let tabel = document.getElementById("tabelJualan");
    let row = tabel.insertRow();

    row.insertCell(0).innerText = item.nama;
    row.insertCell(1).innerText = item.harga;
    row.insertCell(2).innerText = item.jumlah;
    row.insertCell(3).innerText = item.total;

    let btn = document.createElement("button");
    btn.innerText = "Hapus";
    btn.className = "deleteBtn";

    btn.onclick = function() {
        hapusData(index);
    };

    row.insertCell(4).appendChild(btn);
}

function hapusData(index) {
    data.splice(index, 1);
    localStorage.setItem("dataJualan", JSON.stringify(data));
    location.reload();
}

function updateTotal() {
    let total = data.reduce((sum, item) => sum + item.total, 0);
    document.getElementById("grandTotal").innerText = "Total Semua: Rp " + total;
}

function updateDailyReport() {
    let today = new Date().toLocaleDateString();

    let totalHariIni = data
        .filter(item => item.tanggal === today)
        .reduce((sum, item) => sum + item.total, 0);

    document.getElementById("dailyReport").innerText =
        "Laporan Hari Ini: Rp " + totalHariIni;
}
</script>

</body>
</html>
